services:
  - type: worker
    name: polyphonic-attachment-worker
    runtime: docker
    # ClamAV signatures plus Tika's JVM and LibreOffice exceed the 512 MB
    # starter envelope during real document workloads. Keep production honest.
    plan: standard
    dockerfilePath: ./services/attachment-worker/Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ATTACHMENT_STT_MODEL
        value: openai/gpt-4o-mini-transcribe
      - key: ATTACHMENT_OPENROUTER_MODEL
        value: google/gemini-2.5-flash
      - key: ATTACHMENT_SCANNER_DEV_BYPASS
        value: "false"
      - key: ATTACHMENT_WORKER_POLL_SECONDS
        value: "2"
      - key: ATTACHMENT_WORKER_MAX_ATTEMPTS
        value: "4"
